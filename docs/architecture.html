

<style>
@keyframes flow1 { 0%{stroke-dashoffset:60} 100%{stroke-dashoffset:0} }
@keyframes flow2 { 0%{stroke-dashoffset:80} 100%{stroke-dashoffset:0} }
@keyframes flow3 { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes fraud-flash { 0%,100%{opacity:0} 40%,60%{opacity:1} }
.pipe1 { stroke-dasharray:8 4; animation: flow1 0.7s linear infinite; }
.pipe2 { stroke-dasharray:8 4; animation: flow2 0.9s linear infinite; }
.pipe3 { stroke-dasharray:8 4; animation: flow3 1.1s linear infinite; }
.pipe1.paused,.pipe2.paused,.pipe3.paused { animation-play-state: paused; opacity: 0.2; }
.fraud-dot { animation: fraud-flash 1.2s ease-in-out infinite; }
</style>

<div style="padding:0 0 1rem;">

<svg width="100%" viewBox="0 0 680 370" id="pipeline-svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── Producer box ── -->
<g class="node c-teal" id="node-producer" onclick="selectNode('producer')">
  <rect x="20" y="60" width="140" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="90" y="90" text-anchor="middle" dominant-baseline="central">Transaction</text>
  <text class="th" x="90" y="108" text-anchor="middle" dominant-baseline="central">generator</text>
  <text class="ts" x="90" y="128" text-anchor="middle" dominant-baseline="central">23 txn/sec</text>
</g>

<!-- ── Kafka box ── -->
<g class="node c-purple" id="node-kafka" onclick="selectNode('kafka')">
  <rect x="240" y="60" width="140" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="310" y="90" text-anchor="middle" dominant-baseline="central">Apache Kafka</text>
  <text class="ts" x="310" y="110" text-anchor="middle" dominant-baseline="central">transactions topic</text>
  <text class="ts" x="310" y="128" text-anchor="middle" dominant-baseline="central">keyed by user_id</text>
</g>

<!-- ── Spark consumer box ── -->
<g class="node c-amber" id="node-spark" onclick="selectNode('spark')">
  <rect x="460" y="40" width="200" height="120" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="66" text-anchor="middle" dominant-baseline="central">Spark streaming</text>
  <text class="ts" x="560" y="86" text-anchor="middle" dominant-baseline="central">Stateless rules UDF</text>
  <text class="ts" x="560" y="103" text-anchor="middle" dominant-baseline="central">Velocity window (60s)</text>
  <text class="ts" x="560" y="120" text-anchor="middle" dominant-baseline="central">Sub-800ms latency</text>
  <text class="ts" x="560" y="137" text-anchor="middle" dominant-baseline="central">foreachBatch sink</text>
</g>

<!-- ── PostgreSQL: transactions ── -->
<g class="node c-gray" id="node-pg-all" onclick="selectNode('pg-all')">
  <rect x="360" y="240" width="140" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="430" y="264" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="ts" x="430" y="284" text-anchor="middle" dominant-baseline="central">transactions (all)</text>
</g>

<!-- ── PostgreSQL: alerts ── -->
<g class="node c-red" id="node-pg-fraud" onclick="selectNode('pg-fraud')">
  <rect x="530" y="240" width="130" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="595" y="264" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
  <text class="ts" x="595" y="284" text-anchor="middle" dominant-baseline="central">fraud_alerts only</text>
</g>

<!-- ── Animated pipes ── -->
<!-- Producer → Kafka -->
<line id="pipe-pk" class="pipe1" x1="160" y1="100" x2="238" y2="100"
  stroke="#1D9E75" stroke-width="2" fill="none" marker-end="url(#arr)"/>

<!-- Kafka → Spark -->
<line id="pipe-ks" class="pipe2" x1="380" y1="100" x2="458" y2="100"
  stroke="#7F77DD" stroke-width="2" fill="none" marker-end="url(#arr)"/>

<!-- Spark → pg-all (L-bend) -->
<path id="pipe-sa" class="pipe3" d="M560 160 L560 200 L430 200 L430 238"
  stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

<!-- Spark → pg-fraud (L-bend) -->
<path id="pipe-sf" class="pipe3" d="M580 160 L580 220 L595 220 L595 238"
  stroke="#E24B4A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

<!-- Fraud indicator dot on alert pipe -->
<circle id="fraud-indicator" class="fraud-dot" cx="595" cy="220" r="5" fill="#E24B4A"/>

<!-- ── Live counters ── -->
<g id="counter-group">
  <text class="ts" x="90" y="158" text-anchor="middle" dominant-baseline="central" id="cnt-sent" style="font-size:11px">sent: 0</text>
  <text class="ts" x="310" y="158" text-anchor="middle" dominant-baseline="central" id="cnt-lag" style="font-size:11px">lag: 0ms</text>
  <text class="ts" x="430" y="316" text-anchor="middle" dominant-baseline="central" id="cnt-total" style="font-size:11px">0 rows</text>
  <text class="ts" x="595" y="316" text-anchor="middle" dominant-baseline="central" id="cnt-fraud" style="font-size:11px">0 alerts</text>
</g>

<!-- ── Detail panel (shown on click) ── -->
<g id="detail-panel" style="display:none">
  <rect x="60" y="200" width="260" height="110" rx="8" stroke-width="0.5" class="box"/>
  <text class="th" id="dp-title" x="190" y="224" text-anchor="middle" dominant-baseline="central">Detail</text>
  <text class="ts" id="dp-line1" x="80" y="248" dominant-baseline="central"></text>
  <text class="ts" id="dp-line2" x="80" y="266" dominant-baseline="central"></text>
  <text class="ts" id="dp-line3" x="80" y="284" dominant-baseline="central"></text>
  <text class="ts" id="dp-line4" x="80" y="302" dominant-baseline="central"></text>
</g>

</svg>

<!-- ── Controls ── -->
<div style="display:flex;align-items:center;gap:12px;padding:0 4px;flex-wrap:wrap">
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary);cursor:pointer">
    <input type="checkbox" id="toggle-run" checked onchange="togglePipeline(this.checked)" style="width:14px;height:14px;cursor:pointer">
    Pipeline running
  </label>
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-secondary)">
    TPS:
    <input type="range" min="1" max="50" value="23" id="tps-slider" style="width:100px" oninput="setTPS(this.value)">
    <span id="tps-label" style="min-width:28px;font-size:13px;color:var(--color-text-secondary)">23</span>
  </label>
  <span id="fraud-rate-display" style="font-size:13px;color:var(--color-text-secondary)">fraud rate: 0.00%</span>
  <button onclick="resetCounters()" style="font-size:12px;padding:4px 10px;margin-left:auto;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer">Reset</button>
</div>

</div>

<script>
const DETAILS = {
  producer: {
    title: 'Transaction generator',
    lines: [
      '5,000 synthetic users (USR_00001…)',
      '12 merchant categories with realistic',
      'amount distributions (exponential)',
      '4 fraud patterns injected at 0.3%'
    ]
  },
  kafka: {
    title: 'Apache Kafka',
    lines: [
      'Topic: transactions (1 partition)',
      'Key: user_id — ensures ordering',
      'Compression: gzip, linger: 5ms',
      'acks=all for durability guarantee'
    ]
  },
  spark: {
    title: 'Spark structured streaming',
    lines: [
      'readStream from Kafka, watermark 30s',
      'Stateless UDF: high amount, intl ATM,',
      'odd-hour rules — sub-millisecond each',
      'Velocity: sliding 60s window, 10s slide'
    ]
  },
  'pg-all': {
    title: 'transactions table',
    lines: [
      'All events written via foreachBatch',
      'Indexed on user_id + event_time',
      'Includes final_is_fraud + rule columns',
      'Powers fraud_metrics view (hourly)'
    ]
  },
  'pg-fraud': {
    title: 'fraud_alerts table',
    lines: [
      'Flagged events only (final_is_fraud=true)',
      'Columns: rule, confidence, reason',
      'reviewed + true_positive for analyst QA',
      'Powers rule_performance view'
    ]
  }
};

let running = true;
let tps = 23;
let totalSent = 0;
let totalFraud = 0;
let intervalId = null;

function tick() {
  if (!running) return;
  const batch = Math.max(1, Math.round(tps / 10));
  totalSent += batch;
  const fraudBatch = Math.floor(Math.random() < 0.003 * batch ? 1 : 0) + (Math.random() < 0.001 ? 1 : 0);
  totalFraud += fraudBatch;
  const lag = 200 + Math.floor(Math.random() * 400);
  document.getElementById('cnt-sent').textContent = 'sent: ' + totalSent.toLocaleString();
  document.getElementById('cnt-lag').textContent = 'lag: ' + lag + 'ms';
  document.getElementById('cnt-total').textContent = totalSent.toLocaleString() + ' rows';
  document.getElementById('cnt-fraud').textContent = totalFraud + ' alerts';
  const rate = totalSent > 0 ? ((totalFraud / totalSent) * 100).toFixed(2) : '0.00';
  document.getElementById('fraud-rate-display').textContent = 'fraud rate: ' + rate + '%';
}

function startTicker() {
  if (intervalId) clearInterval(intervalId);
  intervalId = setInterval(tick, 100);
}

function togglePipeline(on) {
  running = on;
  ['pipe-pk','pipe-ks','pipe-sa','pipe-sf'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('paused', !on);
  });
  const dot = document.getElementById('fraud-indicator');
  if (dot) dot.style.animationPlayState = on ? 'running' : 'paused';
}

function setTPS(v) {
  tps = parseInt(v);
  document.getElementById('tps-label').textContent = v;
  const dur1 = (24/tps).toFixed(2)+'s';
  const dur2 = (32/tps).toFixed(2)+'s';
  const dur3 = (40/tps).toFixed(2)+'s';
  const s = document.getElementById('pipeline-svg');
  s.querySelectorAll('.pipe1').forEach(e => e.style.animationDuration = dur1);
  s.querySelectorAll('.pipe2').forEach(e => e.style.animationDuration = dur2);
  s.querySelectorAll('.pipe3').forEach(e => e.style.animationDuration = dur3);
}

function selectNode(id) {
  const d = DETAILS[id];
  if (!d) return;
  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';
  document.getElementById('dp-title').textContent = d.title;
  ['dp-line1','dp-line2','dp-line3','dp-line4'].forEach((lid, i) => {
    document.getElementById(lid).textContent = d.lines[i] ? '· ' + d.lines[i] : '';
  });
}

function resetCounters() {
  totalSent = 0; totalFraud = 0;
  document.getElementById('cnt-sent').textContent = 'sent: 0';
  document.getElementById('cnt-lag').textContent = 'lag: 0ms';
  document.getElementById('cnt-total').textContent = '0 rows';
  document.getElementById('cnt-fraud').textContent = '0 alerts';
  document.getElementById('fraud-rate-display').textContent = 'fraud rate: 0.00%';
  document.getElementById('detail-panel').style.display = 'none';
}

startTicker();
</script>
